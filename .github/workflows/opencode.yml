# GraphiView Pre-Merge Architectural Review
#
# This workflow runs Graphify's MCP-powered architectural review on pull requests.
# It builds a knowledge graph, serves it via MCP, and uses OpenCode AI agent to analyze.
#
# Required repository variables:
#   OPENCODE_GATEWAY_AUDIENCE - AI gateway audience for OIDC auth
#
# Optional repository secrets (for custom AI provider):
#   GRAPHIFY_LLM_API_KEY      - API key for graph extraction (Gemini/OpenAI/etc.)
#   OPENCODE_LLM_API_KEY      - API key for AI review agent (overrides OIDC if set)
#   OPENCODE_LLM_BASE_URL     - Custom OpenAI-compatible endpoint (optional)
#   OPENCODE_LLM_MODEL        - Model to use (optional, default: provider default)
#
name: graphify-review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: graphify-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1: Build the Graphify Knowledge Graph
  # ============================================================
  build-graph:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      success: ${{ steps.build-graph-step.outputs.success }}
      node_count: ${{ steps.build-graph-step.outputs.node_count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Graphify graph
        uses: actions/cache@v4
        with:
          path: graphify-out
          key: graphify-graph-${{ hashFiles('**/*.py', '**/*.js', '**/*.ts', '**/*.rs', '**/*.go', '**/*.java') }}
          restore-keys: graphify-graph-

      - name: Install Graphify
        run: |
          pip install "graphifyy[mcp,pdf]"
          graphify --version

      - name: Build knowledge graph
        id: build-graph-step
        env:
          GRAPHIFY_LLM_API_KEY: ${{ secrets.GRAPHIFY_LLM_API_KEY }}
          GRAPHIFY_LLM_BASE_URL: ${{ secrets.GRAPHIFY_LLM_BASE_URL }}
          GRAPHIFY_LLM_MODEL: ${{ secrets.GRAPHIFY_LLM_MODEL }}
        run: |
          echo "Building knowledge graph..."
          graphify update .
          if [ -f "graphify-out/graph.json" ]; then
            NODE_COUNT=$(python3 -c "import json; g=json.load(open('graphify-out/graph.json')); print(len(g.get('nodes', [])))" 2>/dev/null || echo "unknown")
            echo "Graph built with $NODE_COUNT nodes"
            echo "success=true" >> $GITHUB_OUTPUT
            echo "node_count=$NODE_COUNT" >> $GITHUB_OUTPUT
          else
            echo "Graph file not found"
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload graph artifact
        if: steps.build-graph-step.outputs.success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: graphify-graph
          path: graphify-out/graph.json
          retention-days: 1

  # ============================================================
  # Job 2: Run OpenCode AI Agent with Graphify MCP
  # ============================================================
  opencode-review:
    needs: build-graph
    if: needs.build-graph.outputs.success == 'true' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write  # For OIDC token exchange

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download graph artifact
        uses: actions/download-artifact@v4
        with:
          name: graphify-graph
          path: graphify-out

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenCode
        run: |
          npm install -g opencode-ai
          opencode --version

      - name: Set up Python (for Graphify MCP)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Graphify MCP
        run: |
          pip install "graphifyy[mcp,pdf]"
          graphify-mcp --help >/dev/null 2>&1 && echo "Graphify MCP installed" || echo "Graphify MCP not found"

      - name: Configure OpenCode MCP
        run: |
          mkdir -p .opencode
          cat > .opencode/opencode.json << 'OPENCODE_EOF'
          {
            "$schema": "https://opencode.ai/config.json",
            "mcp": {
              "graphify": {
                "type": "local",
                "command": ["graphify-mcp", "graphify-out/graph.json"],
                "enabled": true
              }
            }
          }
          OPENCODE_EOF
          echo "OpenCode MCP configuration created"

      - name: Check for Graphify trigger
        id: check-trigger
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body || '' }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          if [ "$EVENT_NAME" = "issue_comment" ]; then
            if echo "$COMMENT_BODY" | grep -qE '(^|[[:space:]])/(graphify|opencode|oc)\b'; then
              echo "Manual review triggered by comment"
              echo "triggered=true" >> $GITHUB_OUTPUT
            else
              echo "Skipping - not a Graphify trigger"
              echo "triggered=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          else
            echo "Auto review triggered by PR event"
            echo "triggered=true" >> $GITHUB_OUTPUT
          fi

      - name: Exchange OIDC Token for AI Gateway API Key
        if: steps.check-trigger.outputs.triggered == 'true'
        id: oidc-exchange
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GATEWAY_AUDIENCE: ${{ vars.OPENCODE_GATEWAY_AUDIENCE }}
        run: |
          echo "Exchanging GitHub OIDC token for AI Gateway API key..."
          # Get the OIDC token from GitHub
          OIDC_RESPONSE=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${GATEWAY_AUDIENCE}" 2>/dev/null || echo "")
          OIDC_TOKEN=$(echo "$OIDC_RESPONSE" | jq -r '.value' 2>/dev/null || echo "")
          if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
            echo "OIDC token exchange failed, using fallback API key"
            echo "api_key=fallback" >> $GITHUB_OUTPUT
          else
            echo "OIDC token obtained"
            # Exchange OIDC token for gateway API key
            GATEWAY_RESPONSE=$(curl -s -X POST "$GATEWAY_AUDIENCE/auth/token" \
              -H "Content-Type: application/json" \
              -d "{\"token\": \"$OIDC_TOKEN\"}" 2>/dev/null || echo "")
            GATEWAY_API_KEY=$(echo "$GATEWAY_RESPONSE" | jq -r '.api_key // .access_token // .key' 2>/dev/null || echo "")
            if [ -z "$GATEWAY_API_KEY" ] || [ "$GATEWAY_API_KEY" = "null" ]; then
              echo "Gateway API key exchange failed, using fallback"
              echo "api_key=fallback" >> $GITHUB_OUTPUT
            else
              echo "API key obtained from gateway"
              echo "api_key=$GATEWAY_API_KEY" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run OpenCode AI Review
        if: steps.check-trigger.outputs.triggered == 'true'
        id: review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
          # AI Provider Configuration (custom endpoint support)
          # Priority: 1. Explicit secret, 2. OIDC-exchanged key, 3. Fallback providers
          OPENAI_API_KEY: ${{ secrets.OPENCODE_LLM_API_KEY || steps.oidc-exchange.outputs.api_key || secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENCODE_LLM_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENCODE_LLM_MODEL }}
          # Anthropic fallback
          ANTHROPIC_API_KEY: ${{ secrets.OPENCODE_LLM_API_KEY || steps.oidc-exchange.outputs.api_key || secrets.ANTHROPIC_API_KEY }}
          # Google Gemini fallback
          GOOGLE_API_KEY: ${{ secrets.OPENCODE_LLM_API_KEY || steps.oidc-exchange.outputs.api_key || secrets.GOOGLE_API_KEY }}
        run: |
          echo "Running OpenCode AI agent with Graphify MCP..."
          echo "PR: #$PR_NUMBER in $REPOSITORY"

          # Build the review prompt
          PROMPT="You are a senior software architect reviewing PR #$PR_NUMBER in $REPOSITORY.

          Use the Graphify MCP tools to analyze the architectural impact of this PR:
          1. Call 'get_pr_impact' with the changed files
          2. Call 'god_nodes' to identify highly-connected nodes
          3. Call 'detect_cycles' to find circular dependencies
          4. Call 'get_community' to understand module structure
          5. Call 'get_cohesion' to measure module cohesion
          6. Call 'blast_radius' to calculate affected nodes

          Based on the analysis, provide a structured review comment with:
          - Overall risk level (LOW/MEDIUM/HIGH)
          - Key findings with specific data
          - Actionable recommendations
          - Any architectural concerns

          Be concise, objective, and data-driven. Use the Graphify MCP tools - do not guess."

          # Run OpenCode with the review prompt using JSON format for reliable parsing
          # The MCP server will be started automatically from .opencode/opencode.json
          echo "Running OpenCode with prompt..."
          # Use model from secret or default to a known good model
          MODEL="${OPENAI_MODEL:-camer-digital/qwen3p6-plus}"
          echo "Using model: $MODEL"
          opencode run --format json --model "$MODEL" "$PROMPT" > /tmp/opencode-output.json 2>/tmp/opencode-stderr.txt
          OPENCODE_EXIT=$?
          echo "OpenCode exited with: $OPENCODE_EXIT"

          # Extract the review comment from JSON output using a separate Python script file
          # This avoids YAML heredoc issues
          cat > /tmp/parse_output.py << 'PYEOF'
          import json
          import sys

          try:
              with open('/tmp/opencode-output.json', 'r') as f:
                  content = f.read()

              # Parse JSON lines
              assistant_messages = []
              for line in content.strip().split('\n'):
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      event = json.loads(line)
                      if event.get('type') == 'assistant':
                          msg_content = event.get('content', '')
                          if msg_content:
                              assistant_messages.append(msg_content)
                  except json.JSONDecodeError:
                      if line and not line.startswith('['):
                          assistant_messages.append(line)

              if assistant_messages:
                  print('\n\n'.join(assistant_messages))
              else:
                  print("No assistant message found in JSON output")
                  sys.exit(1)
          except Exception as e:
              print(f"Error parsing output: {str(e)}")
              sys.exit(1)
          PYEOF

          REVIEW_COMMENT=$(python3 /tmp/parse_output.py) || REVIEW_COMMENT=""

          # Final fallback
          if [ -z "$REVIEW_COMMENT" ] || [ "$REVIEW_COMMENT" = "No assistant message found in JSON output" ]; then
            REVIEW_COMMENT="## Graphify MCP Analysis Complete

          Status: Analysis completed but output parsing encountered issues.

          ### Next Steps
          - Check workflow logs for detailed OpenCode output
          - Verify MCP server connected properly
          - Ensure LLM API key is configured

          ---
          *Generated by [GraphiView](https://github.com/lele-maxwell/graphiview)*"
          fi

          # Save for next step
          echo "review_comment<<REVIEW_EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW_COMMENT" >> $GITHUB_OUTPUT
          echo "REVIEW_EOF" >> $GITHUB_OUTPUT

      - name: Post PR Comment
        if: steps.check-trigger.outputs.triggered == 'true' && steps.review.outputs.review_comment != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          REVIEW_COMMENT: ${{ steps.review.outputs.review_comment }}
        run: |
          # Check if we already posted a comment
          EXISTING=$(gh pr view "$PR_NUMBER" --json comments -q '.comments[].body' 2>/dev/null | grep -c "Graphify MCP Review" || true)
          if [ "$EXISTING" -gt 0 ]; then
            echo "Graphify review comment already exists, skipping"
            exit 0
          fi

          # Post the AI-generated review comment
          echo "$REVIEW_COMMENT" | gh pr comment "$PR_NUMBER" --body-file -
          echo "Review comment posted to PR #$PR_NUMBER"

      - name: Fallback - Post basic analysis if AI fails
        if: failure() && steps.check-trigger.outputs.triggered == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          NODE_COUNT: ${{ needs.build-graph.outputs.node_count }}
        run: |
          # Post a basic comment if AI review failed
          cat << EOF > /tmp/fallback-comment.md
          ## Graphify Basic Analysis

          AI review failed - posting basic graph analysis

          - **Graph nodes:** $NODE_COUNT
          - **Graph file:** graphify-out/graph.json
          - **Status:** Graph built successfully, but AI agent could not complete review

          ### Next Steps
          - Check workflow logs for AI agent errors
          - Verify API keys are configured for your AI provider
          - Try running /graphify review again after fixing issues

          ---
          *Generated by [GraphiView](https://github.com/lele-maxwell/graphiview)*
          EOF

          gh pr comment "$PR_NUMBER" --body-file /tmp/fallback-comment.md 2>/dev/null || echo "Could not post fallback comment"
          echo "Fallback comment posted"
